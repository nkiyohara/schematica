version: 2
updates:
  - package-ecosystem: npm
    directory: /
    open-pull-requests-limit: 1
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: Europe/London
    groups:
      npm-dependencies:
        patterns:
          - "*"
  - package-ecosystem: cargo
    directory: /
    open-pull-requests-limit: 1
    schedule:
      interval: weekly
      day: monday
      time: "08:15"
      timezone: Europe/London
    groups:
      cargo-dependencies:
        patterns:
          - "*"
  - package-ecosystem: github-actions
    directory: /
    open-pull-requests-limit: 1
    schedule:
      interval: weekly
      day: monday
      time: "08:30"
      timezone: Europe/London
    groups:
      github-actions:
        patterns:
          - "*"
