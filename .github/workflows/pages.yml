name: GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "site/**"
      - ".github/workflows/pages.yml"
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Generate public release manifest
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          manifest_path="$(mktemp)"
          if gh api "repos/${GITHUB_REPOSITORY}/releases?per_page=20" \
            --jq '
              map(select(.draft == false)) | first as $release |
              if $release == null then
                { release: null }
              else
                {
                  release: {
                    version: $release.tag_name,
                    prerelease: $release.prerelease,
                    publishedAt: $release.published_at,
                    htmlUrl: $release.html_url,
                    assets: [
                      $release.assets[] |
                      {
                        name: .name,
                        url: .browser_download_url,
                        size: .size,
                        digest: .digest
                      }
                    ]
                  }
                }
              end
            ' > "$manifest_path"; then
            mv "$manifest_path" site/release-manifest.json
          else
            rm -f "$manifest_path"
            echo "Could not refresh release metadata; using the safe no-release fallback."
          fi

      - name: Upload static site
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
