name: Release

on:
  workflow_dispatch:
    inputs:
      runner_mode:
        description: "Runner selection policy for release jobs"
        required: true
        type: choice
        default: auto
        options:
          - auto
          - hosted
          - self-hosted
  push:
    tags:
      - "v*"

permissions:
  actions: read
  contents: read

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  runner-plan:
    name: Release runner plan
    runs-on: ${{ fromJSON(github.event_name == 'workflow_dispatch' && inputs.runner_mode == 'self-hosted' && '["self-hosted","schematica-release","schematica-linux-x64"]' || '"ubuntu-latest"') }}
    outputs:
      runner_mode: ${{ steps.plan.outputs.runner_mode }}
      qa_runs_on: ${{ steps.plan.outputs.qa_runs_on }}
      qa_runner_kind: ${{ steps.plan.outputs.qa_runner_kind }}
      macos_runs_on: ${{ steps.plan.outputs.macos_runs_on }}
      macos_runner_kind: ${{ steps.plan.outputs.macos_runner_kind }}
      linux_runs_on: ${{ steps.plan.outputs.linux_runs_on }}
      linux_runner_kind: ${{ steps.plan.outputs.linux_runner_kind }}
      windows_runs_on: ${{ steps.plan.outputs.windows_runs_on }}
      windows_runner_kind: ${{ steps.plan.outputs.windows_runner_kind }}
      cli_runs_on: ${{ steps.plan.outputs.cli_runs_on }}
      cli_runner_kind: ${{ steps.plan.outputs.cli_runner_kind }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
      - id: plan
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_RUNNER_ADMIN_TOKEN || github.token }}
          RELEASE_RUNNER_MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.runner_mode || 'auto' }}
        run: node scripts/select-release-runners.mjs

  qa:
    name: Release quality gate
    needs: runner-plan
    runs-on: ${{ fromJSON(needs.runner-plan.outputs.qa_runs_on) }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: . -> target
      - name: Install Linux Tauri dependencies
        if: needs.runner-plan.outputs.qa_runner_kind == 'hosted'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            pkg-config
      - run: corepack enable
      - id: pnpm-store
        shell: bash
        run: echo "STORE_PATH=$(corepack pnpm store path --silent)" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ steps.pnpm-store.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store-
      - run: corepack pnpm install --frozen-lockfile
      - run: node scripts/check-release-version.mjs "${{ github.ref_name }}"
      - run: corepack pnpm format:check
      - run: corepack pnpm lint
      - run: corepack pnpm check
      - run: cargo check --workspace --locked

  release-draft:
    name: Prepare one release draft
    needs: qa
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.release.outputs.release_id }}
      is_draft: ${{ steps.release.outputs.is_draft }}
    steps:
      - id: release
        name: Create or reuse the release draft
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ github.ref_name }}
        shell: bash
        run: |
          release_id="$(
            gh api --paginate "repos/$GH_REPO/releases?per_page=100" \
              --jq ".[] | select(.tag_name == \"$RELEASE_TAG\") | .id" \
              | head -n 1
          )"

          if [[ -z "$release_id" ]]; then
            release_id="$(
              gh api --method POST "repos/$GH_REPO/releases" \
                -f tag_name="$RELEASE_TAG" \
                -f name="Schematica $RELEASE_TAG" \
                -F draft=true \
                -F prerelease=true \
                --jq .id
            )"
          fi

          is_draft="$(gh api "repos/$GH_REPO/releases/$release_id" --jq .draft)"
          echo "release_id=$release_id" >> "$GITHUB_OUTPUT"
          echo "is_draft=$is_draft" >> "$GITHUB_OUTPUT"
          gh api "repos/$GH_REPO/releases/$release_id" \
            --jq '{id, tag_name, draft, prerelease, html_url}'

  desktop-macos:
    name: Tauri macOS signed bundle
    needs:
      - runner-plan
      - qa
      - release-draft
    if: needs.release-draft.outputs.is_draft == 'true'
    environment: macos-signing
    permissions:
      contents: write
    runs-on: ${{ fromJSON(needs.runner-plan.outputs.macos_runs_on) }}
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: . -> target
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
      - run: corepack enable
      - id: pnpm-store
        shell: bash
        run: echo "STORE_PATH=$(corepack pnpm store path --silent)" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ steps.pnpm-store.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store-
      - run: corepack pnpm install --frozen-lockfile
      - name: Import Apple Developer ID certificate
        if: needs.runner-plan.outputs.macos_runner_kind == 'hosted'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        shell: bash
        run: |
          certificate_path="$RUNNER_TEMP/developer-id-application.p12"
          developer_id_g2_path="$RUNNER_TEMP/developer-id-g2.der"
          keychain_path="$RUNNER_TEMP/schematica-signing.keychain-db"

          printf '%s' "$APPLE_CERTIFICATE" | base64 --decode > "$certificate_path"

          curl --fail --location --silent --show-error \
            https://www.apple.com/certificateauthority/DeveloperIDG2CA.cer \
            --output "$developer_id_g2_path"
          echo "f16cd3c54c7f83cea4bf1a3e6a0819c8aaa8e4a1528fd144715f350643d2df3a  $developer_id_g2_path" \
            | shasum -a 256 -c -

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$keychain_path"
          security import "$certificate_path" \
            -k "$keychain_path" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          security find-certificate \
            -c "Developer ID Certification Authority" \
            "$keychain_path" >/dev/null 2>&1 \
            || security add-certificates -k "$keychain_path" "$developer_id_g2_path"
          security list-keychains -d user -s "$keychain_path"
          security default-keychain -d user -s "$keychain_path"
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$keychain_path"
          security find-identity -v -p codesigning "$keychain_path"
      - uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_SIGNING_IDENTITY: ${{ vars.APPLE_SIGNING_IDENTITY }}
        with:
          releaseId: ${{ needs.release-draft.outputs.release_id }}
          projectPath: apps/desktop
          tagName: ${{ github.ref_name }}
          releaseName: "Schematica ${{ github.ref_name }}"
          releaseBody: |
            Schematica beta desktop binaries and CLI tarball.

            Downloads:
            - macOS Apple Silicon: the `aarch64.dmg` asset
            - Linux: AppImage, deb, or rpm
            - CLI: `schematica-cli-${{ github.ref_name }}.tar.gz` with its matching `.asc` signature

            Windows note:
            Official Windows binaries are not published while code signing is pending. Windows builds are still smoke-tested in CI.

            Quality checks for this release:
            - Format, lint, JS/package checks, and `cargo check --workspace --locked`
            - Signed macOS and Linux Tauri release builds
            - Unsigned Windows smoke build, without publishing Windows release assets
            - Linux desktop binary smoke test under Xvfb to catch startup crashes and blank-launch failures

            macOS note:
            The macOS build is signed with a Developer ID Application certificate and submitted for Apple notarization during the release workflow.

            Linux note:
            Linux artifacts include GPG detached signatures and signed SHA256 checksums. The public key is available in `docs/release-signing/schematica-linux-gpg-public.asc`.
          releaseDraft: true
          prerelease: true
          args: "--ci"
      - name: Verify macOS signature and notarization ticket
        shell: bash
        run: |
          shopt -s nullglob
          app_bundles=(target/release/bundle/macos/*.app)
          disk_images=(target/release/bundle/dmg/*.dmg)

          if [[ "${#app_bundles[@]}" -ne 1 || "${#disk_images[@]}" -ne 1 ]]; then
            echo "Expected exactly one macOS app bundle and one DMG." >&2
            exit 1
          fi

          codesign --verify --deep --strict --verbose=2 "${app_bundles[0]}"
          spctl --assess --type exec --verbose=4 "${app_bundles[0]}"
          xcrun stapler validate "${disk_images[0]}"
          spctl \
            --assess \
            --type open \
            --context context:primary-signature \
            --verbose=4 \
            "${disk_images[0]}"
      - name: Remove temporary macOS signing keychain
        if: always() && needs.runner-plan.outputs.macos_runner_kind == 'hosted'
        shell: bash
        run: |
          keychain_path="$RUNNER_TEMP/schematica-signing.keychain-db"
          security delete-keychain "$keychain_path" 2>/dev/null || true
          rm -f \
            "$RUNNER_TEMP/developer-id-application.p12" \
            "$RUNNER_TEMP/developer-id-g2.der"

  desktop-linux:
    name: Tauri Linux signed bundles
    needs:
      - runner-plan
      - qa
      - release-draft
    if: needs.release-draft.outputs.is_draft == 'true'
    environment: linux-signing
    permissions:
      contents: write
    runs-on: ${{ fromJSON(needs.runner-plan.outputs.linux_runs_on) }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: . -> target
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
      - name: Install Linux Tauri dependencies
        if: needs.runner-plan.outputs.linux_runner_kind == 'hosted'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            pkg-config \
            xvfb
      - run: corepack enable
      - id: pnpm-store
        shell: bash
        run: echo "STORE_PATH=$(corepack pnpm store path --silent)" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ steps.pnpm-store.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store-
      - run: corepack pnpm install --frozen-lockfile
      - name: Import GPG release signing key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        shell: bash
        run: |
          export GNUPGHOME="$RUNNER_TEMP/schematica-release-gnupg"
          mkdir -p "$GNUPGHOME"
          chmod 700 "$GNUPGHOME"
          printf '%s' "$GPG_PRIVATE_KEY" | gpg --batch --import
          gpg --batch --list-secret-keys --keyid-format LONG "${{ vars.GPG_FINGERPRINT }}"
          echo "GNUPGHOME=$GNUPGHOME" >> "$GITHUB_ENV"
      - uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SIGN: "1"
          SIGN_KEY: ${{ vars.GPG_FINGERPRINT }}
          APPIMAGETOOL_SIGN_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          APPIMAGETOOL_FORCE_SIGN: "1"
        with:
          releaseId: ${{ needs.release-draft.outputs.release_id }}
          projectPath: apps/desktop
          tagName: ${{ github.ref_name }}
          releaseName: "Schematica ${{ github.ref_name }}"
          releaseBody: |
            Schematica beta desktop binaries and CLI tarball.

            Downloads:
            - macOS Apple Silicon: the `aarch64.dmg` asset
            - Linux: AppImage, deb, or rpm
            - CLI: `schematica-cli-${{ github.ref_name }}.tar.gz` with its matching `.asc` signature

            Windows note:
            Official Windows binaries are not published while code signing is pending. Windows builds are still smoke-tested in CI.

            Quality checks for this release:
            - Format, lint, JS/package checks, and `cargo check --workspace --locked`
            - Signed macOS and Linux Tauri release builds
            - Unsigned Windows smoke build, without publishing Windows release assets
            - Linux desktop binary smoke test under Xvfb to catch startup crashes and blank-launch failures

            macOS note:
            The macOS build is signed with a Developer ID Application certificate and submitted for Apple notarization during the release workflow.

            Linux note:
            Linux artifacts include GPG detached signatures and signed SHA256 checksums. The public key is available in `docs/release-signing/schematica-linux-gpg-public.asc`.
          releaseDraft: true
          prerelease: true
          args: "--ci"
      - name: Smoke Linux desktop binary
        run: bash apps/desktop/scripts/smoke-linux-binary.sh
      - name: Sign Linux release artifacts
        env:
          GPG_FINGERPRINT: ${{ vars.GPG_FINGERPRINT }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        shell: bash
        run: |
          cd target/release/bundle

          mapfile -d '' release_artifacts < <(
            find appimage deb rpm \
              -maxdepth 2 \
              -type f \
              \( -name '*.AppImage' -o -name '*.deb' -o -name '*.rpm' \) \
              -print0 \
              | sort -z
          )

          if [[ "${#release_artifacts[@]}" -eq 0 ]]; then
            echo "No Linux release artifacts found under target/release/bundle." >&2
            exit 1
          fi

          : > SHA256SUMS
          for artifact in "${release_artifacts[@]}"; do
            artifact_hash="$(sha256sum "$artifact" | cut -d ' ' -f 1)"
            printf '%s  %s\n' "$artifact_hash" "$(basename "$artifact")" >> SHA256SUMS
          done

          for artifact in "${release_artifacts[@]}"; do
            gpg \
              --batch \
              --yes \
              --pinentry-mode loopback \
              --passphrase "$GPG_PASSPHRASE" \
              --local-user "$GPG_FINGERPRINT" \
              --armor \
              --detach-sign \
              --output "$artifact.asc" \
              "$artifact"
          done

          gpg \
            --batch \
            --yes \
            --pinentry-mode loopback \
            --passphrase "$GPG_PASSPHRASE" \
            --local-user "$GPG_FINGERPRINT" \
            --armor \
            --detach-sign \
            --output SHA256SUMS.asc \
            SHA256SUMS

          for artifact in "${release_artifacts[@]}"; do
            gpg --batch --verify "$artifact.asc" "$artifact"
          done
          gpg --batch --verify SHA256SUMS.asc SHA256SUMS
      - uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          name: "Schematica ${{ github.ref_name }}"
          draft: true
          prerelease: true
          files: |
            target/release/bundle/SHA256SUMS
            target/release/bundle/SHA256SUMS.asc
            target/release/bundle/appimage/*.AppImage.asc
            target/release/bundle/deb/*.deb.asc
            target/release/bundle/rpm/*.rpm.asc
            docs/release-signing/schematica-linux-gpg-public.asc
      - name: Remove temporary Linux signing keyring
        if: always()
        shell: bash
        run: |
          gpg_home="$RUNNER_TEMP/schematica-release-gnupg"
          if [[ -z "$RUNNER_TEMP" || "$gpg_home" != "$RUNNER_TEMP/"* ]]; then
            echo "Refusing to remove an unexpected GPG home: $gpg_home" >&2
            exit 1
          fi
          gpgconf --homedir "$gpg_home" --kill all 2>/dev/null || true
          rm -rf -- "$gpg_home"

  desktop-windows-smoke:
    name: Tauri Windows smoke build
    needs:
      - runner-plan
      - qa
      - release-draft
    if: needs.release-draft.outputs.is_draft == 'true'
    permissions:
      contents: read
    runs-on: ${{ fromJSON(needs.runner-plan.outputs.windows_runs_on) }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: . -> target
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
      - run: corepack enable
      - id: pnpm-store
        shell: bash
        run: echo "STORE_PATH=$(corepack pnpm store path --silent)" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ steps.pnpm-store.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store-
      - run: corepack pnpm install --frozen-lockfile
      - name: Build unsigned Windows bundle without publishing
        working-directory: apps/desktop
        shell: bash
        run: corepack pnpm tauri build --ci --no-sign --bundles nsis

  cli:
    name: CLI release tarball
    needs:
      - runner-plan
      - release-draft
      - desktop-macos
      - desktop-linux
      - desktop-windows-smoke
    if: needs.release-draft.outputs.is_draft == 'true'
    environment: linux-signing
    runs-on: ${{ fromJSON(needs.runner-plan.outputs.cli_runs_on) }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
      - run: corepack enable
      - id: pnpm-store
        shell: bash
        run: echo "STORE_PATH=$(corepack pnpm store path --silent)" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ steps.pnpm-store.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store-
      - run: corepack pnpm install --frozen-lockfile
      - name: Import GPG release signing key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        shell: bash
        run: |
          export GNUPGHOME="$RUNNER_TEMP/schematica-release-gnupg"
          mkdir -p "$GNUPGHOME"
          chmod 700 "$GNUPGHOME"
          printf '%s' "$GPG_PRIVATE_KEY" | gpg --batch --import
          gpg --batch --list-secret-keys --keyid-format LONG "${{ vars.GPG_FINGERPRINT }}"
          echo "GNUPGHOME=$GNUPGHOME" >> "$GITHUB_ENV"
      - run: corepack pnpm --filter @schematica/cli build
      - name: Smoke-test standalone CLI artifact
        shell: bash
        run: |
          artifact_dir="$(mktemp -d)"
          cp packages/cli/dist/index.cjs "$artifact_dir/schematica.cjs"
          (cd "$artifact_dir" && node schematica.cjs --help)
      - run: tar -czf schematica-cli-${{ github.ref_name }}.tar.gz -C packages/cli dist package.json
      - name: Sign CLI release tarball
        env:
          GPG_FINGERPRINT: ${{ vars.GPG_FINGERPRINT }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        shell: bash
        run: |
          gpg \
            --batch \
            --yes \
            --pinentry-mode loopback \
            --passphrase "$GPG_PASSPHRASE" \
            --local-user "$GPG_FINGERPRINT" \
            --armor \
            --detach-sign \
            --output schematica-cli-${{ github.ref_name }}.tar.gz.asc \
            schematica-cli-${{ github.ref_name }}.tar.gz
          gpg --batch --verify \
            schematica-cli-${{ github.ref_name }}.tar.gz.asc \
            schematica-cli-${{ github.ref_name }}.tar.gz
      - uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          name: "Schematica ${{ github.ref_name }}"
          body: |
            Schematica beta desktop binaries and CLI tarball.

            Downloads:
            - macOS Apple Silicon: the `aarch64.dmg` asset
            - Linux: AppImage, deb, or rpm
            - CLI: `schematica-cli-${{ github.ref_name }}.tar.gz` with its matching `.asc` signature

            Windows note:
            Official Windows binaries are not published while code signing is pending. Windows builds are still smoke-tested in CI.

            Quality checks for this release:
            - Format, lint, JS/package checks, and `cargo check --workspace --locked`
            - Signed macOS and Linux Tauri release builds
            - Unsigned Windows smoke build, without publishing Windows release assets
            - Linux desktop binary smoke test under Xvfb to catch startup crashes and blank-launch failures

            macOS note:
            The macOS build is signed with a Developer ID Application certificate and submitted for Apple notarization during the release workflow.

            Linux note:
            Linux artifacts include GPG detached signatures and signed SHA256 checksums. The public key is available in `docs/release-signing/schematica-linux-gpg-public.asc`.
          draft: true
          prerelease: true
          files: |
            schematica-cli-${{ github.ref_name }}.tar.gz
            schematica-cli-${{ github.ref_name }}.tar.gz.asc
      - name: Verify complete release asset set
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RELEASE_ID: ${{ needs.release-draft.outputs.release_id }}
          RELEASE_TAG: ${{ github.ref_name }}
        shell: bash
        run: |
          asset_names="$(
            gh api --paginate "repos/$GH_REPO/releases/$RELEASE_ID/assets?per_page=100" \
              --jq '.[].name' \
              | sort -u
          )"
          printf '%s\n' "$asset_names"

          require_asset() {
            if ! grep -Fqx -- "$1" <<<"$asset_names"; then
              echo "Missing required release asset: $1" >&2
              exit 1
            fi
          }

          require_one_suffix() {
            local suffix="$1"
            local matches
            matches="$(grep -E "${suffix}$" <<<"$asset_names" || true)"
            if [[ -z "$matches" ]]; then
              echo "No release asset ends with $suffix" >&2
              exit 1
            fi
            printf '%s\n' "$matches"
          }

          require_one_suffix '\.dmg'
          require_asset "schematica-cli-$RELEASE_TAG.tar.gz"
          require_asset "schematica-cli-$RELEASE_TAG.tar.gz.asc"
          require_asset "SHA256SUMS"
          require_asset "SHA256SUMS.asc"
          require_asset "schematica-linux-gpg-public.asc"

          for suffix in AppImage deb rpm; do
            while IFS= read -r artifact; do
              require_asset "$artifact.asc"
            done < <(require_one_suffix "\\.$suffix")
          done

          if grep -Eiq '\.(exe|msi)$' <<<"$asset_names"; then
            echo "Unsigned Windows installer found in the release asset set." >&2
            exit 1
          fi
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RELEASE_ID: ${{ needs.release-draft.outputs.release_id }}
          RELEASE_TAG: ${{ github.ref_name }}
        shell: bash
        run: |
          is_draft="$(gh api "repos/$GH_REPO/releases/$RELEASE_ID" --jq .draft)"
          if [[ "$is_draft" == "true" ]]; then
            gh api -X PATCH "repos/$GH_REPO/releases/$RELEASE_ID" \
              -F draft=false \
              -F prerelease=true \
              -f name="Schematica $RELEASE_TAG"
          else
            echo "Release $RELEASE_TAG is already published; skipping publish transition."
          fi
      - name: Remove temporary CLI signing keyring
        if: always()
        shell: bash
        run: |
          gpg_home="$RUNNER_TEMP/schematica-release-gnupg"
          if [[ -z "$RUNNER_TEMP" || "$gpg_home" != "$RUNNER_TEMP/"* ]]; then
            echo "Refusing to remove an unexpected GPG home: $gpg_home" >&2
            exit 1
          fi
          gpgconf --homedir "$gpg_home" --kill all 2>/dev/null || true
          rm -rf -- "$gpg_home"

  refresh-pages:
    name: Refresh installation page
    needs:
      - release-draft
      - cli
    if: >-
      always() &&
      needs.release-draft.result == 'success' &&
      (needs.release-draft.outputs.is_draft == 'false' || needs.cli.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Dispatch GitHub Pages deployment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run pages.yml --ref main
