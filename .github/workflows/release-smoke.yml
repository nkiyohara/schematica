name: Release Smoke

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/release-smoke.yml"
      - ".github/workflows/release.yml"
      - "apps/desktop/**"
      - "packages/core/**"
      - "pnpm-lock.yaml"
      - "Cargo.lock"
      - "Cargo.toml"

concurrency:
  group: release-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  desktop-bundles:
    name: Desktop bundle smoke
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            artifact: schematica-macos-smoke
            args: "--ci --no-sign"
          - platform: ubuntu-latest
            artifact: schematica-linux-smoke
            args: "--ci --no-sign"
          - platform: windows-latest
            artifact: schematica-windows-smoke
            args: "--ci --no-sign --bundles nsis"

    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          workspaces: . -> target
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24
      - name: Install Linux Tauri dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            pkg-config \
            xvfb
      - run: corepack enable
      - id: pnpm-store
        shell: bash
        run: echo "STORE_PATH=$(corepack pnpm store path --silent)" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ steps.pnpm-store.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store-
      - run: corepack pnpm install --frozen-lockfile
      - name: Build desktop bundle
        working-directory: apps/desktop
        shell: bash
        run: corepack pnpm tauri build ${{ matrix.args }}
      - name: Smoke Linux desktop binary
        if: matrix.platform == 'ubuntu-latest'
        run: bash apps/desktop/scripts/smoke-linux-binary.sh
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ matrix.artifact }}
          path: target/release/bundle/**/*
          if-no-files-found: error
          retention-days: 5
