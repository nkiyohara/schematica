name: Release Smoke

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/release-smoke.yml"
      - ".github/workflows/release.yml"
      - "apps/desktop/**"
      - "packages/core/**"
      - "pnpm-lock.yaml"
      - "Cargo.lock"
      - "Cargo.toml"

concurrency:
  group: release-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  desktop-bundles:
    name: Desktop bundle smoke
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            artifact: schematica-macos-smoke
            args: "--ci --no-sign"
          - platform: ubuntu-latest
            artifact: schematica-linux-smoke
            args: "--ci --no-sign"
          - platform: windows-latest
            artifact: schematica-windows-smoke
            args: "--ci --no-sign --bundles nsis"

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: . -> target
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
      - name: Install Linux Tauri dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            pkg-config \
            xvfb
      - run: corepack enable
      - id: pnpm-store
        shell: bash
        run: echo "STORE_PATH=$(corepack pnpm store path --silent)" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ steps.pnpm-store.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store-
      - run: corepack pnpm install --frozen-lockfile
      - name: Build desktop bundle
        working-directory: apps/desktop
        shell: bash
        run: corepack pnpm tauri build ${{ matrix.args }}
      - name: Smoke Linux desktop binary
        if: matrix.platform == 'ubuntu-latest'
        run: bash apps/desktop/scripts/smoke-linux-binary.sh
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.artifact }}
          path: target/release/bundle/**/*
          if-no-files-found: error
          retention-days: 5
